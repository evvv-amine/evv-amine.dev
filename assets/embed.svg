<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0D15"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0A0D15"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blurs -->
  <circle cx="200" cy="150" r="200" fill="#3B82F6" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1000" cy="500" r="250" fill="#A855F7" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="600" cy="315" r="150" fill="#3B82F6" opacity="0.05" filter="url(#blur2)"/>

  <!-- Grid lines -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#3B82F6" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#3B82F6" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#3B82F6" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#3B82F6" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#3B82F6" stroke-width="0.3" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="630" stroke="#3B82F6" stroke-width="0.3" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#3B82F6" stroke-width="0.3" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#3B82F6" stroke-width="0.3" opacity="0.1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#3B82F6" stroke-width="0.3" opacity="0.1"/>
  <line x1="1000" y1="0" x2="1000" y2="630" stroke="#3B82F6" stroke-width="0.3" opacity="0.1"/>

  <!-- Floating dots -->
  <circle cx="150" cy="80" r="2" fill="#3B82F6" opacity="0.4"/>
  <circle cx="350" cy="180" r="1.5" fill="#A855F7" opacity="0.3"/>
  <circle cx="550" cy="120" r="2" fill="#3B82F6" opacity="0.35"/>
  <circle cx="750" cy="200" r="1.5" fill="#A855F7" opacity="0.4"/>
  <circle cx="950" cy="100" r="2" fill="#3B82F6" opacity="0.3"/>
  <circle cx="1100" cy="180" r="1.5" fill="#A855F7" opacity="0.35"/>
  <circle cx="100" cy="450" r="2" fill="#3B82F6" opacity="0.3"/>
  <circle cx="300" cy="520" r="1.5" fill="#A855F7" opacity="0.4"/>
  <circle cx="500" cy="480" r="2" fill="#3B82F6" opacity="0.35"/>
  <circle cx="700" cy="550" r="1.5" fill="#A855F7" opacity="0.3"/>
  <circle cx="900" cy="500" r="2" fill="#3B82F6" opacity="0.4"/>
  <circle cx="1050" cy="530" r="1.5" fill="#A855F7" opacity="0.35"/>

  <!-- Logo glow background -->
  <circle cx="600" cy="220" r="80" fill="#3B82F6" opacity="0.15" filter="url(#blur2)"/>

  <!-- Logo bracket left -->
  <text x="530" y="245" font-family="monospace" font-size="72" font-weight="700" fill="url(#glow)" filter="url(#glow-filter)">&lt;</text>

  <!-- Logo slash -->
  <text x="575" y="245" font-family="monospace" font-size="72" font-weight="800" fill="#A855F7" filter="url(#glow-filter)">/</text>

  <!-- Logo bracket right -->
  <text x="615" y="245" font-family="monospace" font-size="72" font-weight="700" fill="url(#glow)" filter="url(#glow-filter)">&gt;</text>

  <!-- Brand name -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.5">evv amine.dev</text>

  <!-- Divider line -->
  <rect x="450" y="345" width="300" height="2" rx="1" fill="url(#text-grad)" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="600" y="385" font-family="Arial, sans-serif" font-size="20" fill="#94A3B8" text-anchor="middle">Building Modern Websites &amp; Digital Experiences</text>

  <!-- Tags -->
  <rect x="370" y="420" width="120" height="32" rx="16" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="0.5" opacity="0.8"/>
  <text x="430" y="441" font-family="Arial, sans-serif" font-size="12" fill="#3B82F6" text-anchor="middle" font-weight="500">Web Development</text>

  <rect x="510" y="420" width="90" height="32" rx="16" fill="rgba(168,85,247,0.15)" stroke="#A855F7" stroke-width="0.5" opacity="0.8"/>
  <text x="555" y="441" font-family="Arial, sans-serif" font-size="12" fill="#A855F7" text-anchor="middle" font-weight="500">UI/UX Design</text>

  <rect x="620" y="420" width="100" height="32" rx="16" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="0.5" opacity="0.8"/>
  <text x="670" y="441" font-family="Arial, sans-serif" font-size="12" fill="#10B981" text-anchor="middle" font-weight="500">Discord Bots</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(17,24,39,0.6)"/>
  <line x1="0" y1="590" x2="1200" y2="590" stroke="url(#text-grad)" stroke-width="1" opacity="0.3"/>

  <!-- Bottom text -->
  <text x="600" y="615" font-family="Arial, sans-serif" font-size="13" fill="#64748B" text-anchor="middle">Professional Web Development Solutions</text>

  <!-- Corner accents -->
  <rect x="30" y="30" width="60" height="2" rx="1" fill="#3B82F6" opacity="0.4"/>
  <rect x="30" y="30" width="2" height="60" rx="1" fill="#3B82F6" opacity="0.4"/>

  <rect x="1110" y="30" width="60" height="2" rx="1" fill="#A855F7" opacity="0.4"/>
  <rect x="1168" y="30" width="2" height="60" rx="1" fill="#A855F7" opacity="0.4"/>

  <rect x="30" y="598" width="60" height="2" rx="1" fill="#3B82F6" opacity="0.4"/>
  <rect x="30" y="540" width="2" height="60" rx="1" fill="#3B82F6" opacity="0.4"/>

  <rect x="1110" y="598" width="60" height="2" rx="1" fill="#A855F7" opacity="0.4"/>
  <rect x="1168" y="540" width="2" height="60" rx="1" fill="#A855F7" opacity="0.4"/>
</svg>
